<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tactical Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 10;
            background: rgba(22, 27, 34, 0.9);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px 14px;
            max-width: 220px;
        }

        #ui h2 {
            font-size: 13px;
            color: #58a6ff;
            margin-bottom: 4px;
        }

        #info {
            font-size: 11px;
            color: #6e7681;
            line-height: 1.5;
        }

        #status {
            font-size: 11px;
            color: #5dbe6a;
            margin-top: 6px;
        }

        #error {
            font-size: 11px;
            color: #ff6b6b;
            margin-top: 6px;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: #0d1117;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            z-index: 100;
        }

        #loading h2 {
            font-size: 16px;
            color: #58a6ff;
        }

        #loading p {
            font-size: 12px;
            color: #6e7681;
            text-align: center;
            padding: 0 24px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div id="loading">
        <div class="spinner"></div>
        <h2>Tactical Viewer</h2>
        <p id="load-status">Connecting to commander's system...</p>
    </div>

    <div id="ui" style="display:none">
        <h2>Tactical Viewer</h2>
        <div id="info"></div>
        <div id="status">Drag → orbit &nbsp;·&nbsp; Pinch → zoom</div>
        <div id="error"></div>
    </div>

    <canvas id="c"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        (async function () {

            // ── Step 1: Get data ──────────────────────────────────────
            async function getData() {
                const params = new URLSearchParams(window.location.search);
                if (params.has("payload")) {
                    const raw = decodeURIComponent(params.get("payload"));
                    const decoded = atob(raw);
                    const bytes = Uint8Array.from(decoded, c => c.charCodeAt(0));
                    const text = new TextDecoder().decode(bytes);
                    return JSON.parse(text);
                }

                const origin = window.location.origin;
                const res = await fetch(`${origin}/sync-data`, {
                    cache: "no-store"
                });
                if (!res.ok) throw new Error(`Server returned ${res.status}`);
                return await res.json();
            }

            function getWallPoint(wall, kind) {
                return wall[kind] || wall[kind === "start" ? "s" : "e"] || [0, 0];
            }

            function createGrid(walls, scale = 0.05, cellSize = 0.5) {
                if (!walls || walls.length === 0) return null;

                let minX = Infinity, maxX = -Infinity;
                let minZ = Infinity, maxZ = -Infinity;

                walls.forEach(w => {
                    const start = getWallPoint(w, "start");
                    const end = getWallPoint(w, "end");
                    const x1 = start[0] * scale, z1 = start[1] * scale;
                    const x2 = end[0] * scale, z2 = end[1] * scale;
                    minX = Math.min(minX, x1, x2);
                    maxX = Math.max(maxX, x1, x2);
                    minZ = Math.min(minZ, z1, z2);
                    maxZ = Math.max(maxZ, z1, z2);
                });

                const PAD = cellSize * 3;
                minX -= PAD; minZ -= PAD;
                maxX += PAD; maxZ += PAD;

                const cols = Math.ceil((maxX - minX) / cellSize);
                const rows = Math.ceil((maxZ - minZ) / cellSize);

                const grid = Array.from({ length: rows }, (_, r) =>
                    Array.from({ length: cols }, (_, c) => ({
                        col: c,
                        row: r,
                        worldX: minX + (c + 0.5) * cellSize,
                        worldZ: minZ + (r + 0.5) * cellSize,
                        walkable: true,
                        visible: false,
                        risk: 0
                    }))
                );

                walls.forEach(w => {
                    const start = getWallPoint(w, "start");
                    const end = getWallPoint(w, "end");
                    const x1 = start[0] * scale, z1 = start[1] * scale;
                    const x2 = end[0] * scale, z2 = end[1] * scale;
                    const steps = Math.ceil(Math.sqrt((x2 - x1) ** 2 + (z2 - z1) ** 2) / (cellSize * 0.4));
                    for (let i = 0; i <= steps; i++) {
                        const t = steps === 0 ? 0 : i / steps;
                        const wx = x1 + (x2 - x1) * t;
                        const wz = z1 + (z2 - z1) * t;
                        const c = Math.floor((wx - minX) / cellSize);
                        const r = Math.floor((wz - minZ) / cellSize);
                        if (r >= 0 && r < rows && c >= 0 && c < cols) {
                            grid[r][c].walkable = false;
                        }
                    }
                });

                return { grid, rows, cols, minX, minZ, maxX, maxZ, cellSize };
            }

            function computeHeatmap(gridData, exitCells = [], weights = {}) {
                if (!gridData) return;
                const { wBlind = 5, wDist = 2, wCorner = 3 } = weights;
                const { grid, rows, cols } = gridData;
                const dist = Array.from({ length: rows }, () => Array(cols).fill(Infinity));
                const queue = [];

                exitCells.forEach(({ col, row }) => {
                    if (row >= 0 && row < rows && col >= 0 && col < cols && grid[row][col].walkable) {
                        dist[row][col] = 0;
                        queue.push({ row, col });
                    }
                });

                let head = 0;
                while (head < queue.length) {
                    const { row, col } = queue[head++];
                    [[-1, 0], [1, 0], [0, -1], [0, 1]].forEach(([dr, dc]) => {
                        const nr = row + dr;
                        const nc = col + dc;
                        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc].walkable && dist[nr][nc] === Infinity) {
                            dist[nr][nc] = dist[row][col] + 1;
                            queue.push({ row: nr, col: nc });
                        }
                    });
                }

                let maxDist = 1;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (dist[r][c] !== Infinity) maxDist = Math.max(maxDist, dist[r][c]);
                    }
                }

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const cell = grid[r][c];
                        if (!cell.walkable) {
                            cell.risk = 0;
                            continue;
                        }
                        const normD = dist[r][c] === Infinity ? 1 : dist[r][c] / maxDist;
                        const adjacentWalls = [[-1, 0], [1, 0], [0, -1], [0, 1]].reduce((count, [dr, dc]) => {
                            const nr = r + dr;
                            const nc = c + dc;
                            return count + (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !grid[nr][nc].walkable ? 1 : 0);
                        }, 0);
                        const corner = adjacentWalls >= 2 ? 1 : 0;
                        const blind = 1;
                        cell.risk = wBlind * blind + wDist * normD + wCorner * corner;
                    }
                }

                let maxRisk = 1;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        maxRisk = Math.max(maxRisk, grid[r][c].risk);
                    }
                }
                if (maxRisk > 0) {
                    for (let r = 0; r < rows; r++) {
                        for (let c = 0; c < cols; c++) {
                            grid[r][c].risk = grid[r][c].risk / maxRisk;
                        }
                    }
                }
            }

            function removeHeatmap(scene, floorIndex) {
                const existing = scene.getObjectByName(`heatmap-floor-${floorIndex}`);
                if (existing) {
                    existing.traverse(child => {
                        if (child.geometry) child.geometry.dispose();
                        if (child.material) child.material.dispose();
                    });
                    scene.remove(existing);
                }
            }

            function renderHeatmap(scene, gridData, floorIndex, floorY = 0) {
                removeHeatmap(scene, floorIndex);
                if (!gridData) return;
                const group = new THREE.Group();
                group.name = `heatmap-floor-${floorIndex}`;
                const green = new THREE.Color(0x27ae60);
                const yellow = new THREE.Color(0xf1c40f);
                const red = new THREE.Color(0xc0392b);

                for (let r = 0; r < gridData.rows; r++) {
                    for (let c = 0; c < gridData.cols; c++) {
                        const cell = gridData.grid[r][c];
                        if (!cell.walkable) continue;
                        const risk = Math.max(0, Math.min(1, cell.risk));
                        if (risk <= 0) continue;
                        let color;
                        if (risk < 0.5) {
                            color = green.clone().lerp(yellow, risk * 2);
                        } else {
                            color = yellow.clone().lerp(red, (risk - 0.5) * 2);
                        }
                        const geo = new THREE.PlaneGeometry(gridData.cellSize * 0.85, gridData.cellSize * 0.85);
                        const mat = new THREE.MeshBasicMaterial({
                            color,
                            transparent: true,
                            opacity: 0.55,
                            side: THREE.DoubleSide,
                            depthWrite: false
                        });
                        const mesh = new THREE.Mesh(geo, mat);
                        mesh.rotation.x = -Math.PI / 2;
                        mesh.position.set(cell.worldX, floorY + 0.12, cell.worldZ);
                        group.add(mesh);
                    }
                }
                scene.add(group);
            }

            function renderExitMarkers(scene, gridData, exitCells, floorIndex, floorY = 0) {
                const existing = scene.getObjectByName(`exit-markers-floor-${floorIndex}`);
                if (existing) {
                    existing.traverse(child => {
                        if (child.geometry) child.geometry.dispose();
                        if (child.material) child.material.dispose();
                    });
                    scene.remove(existing);
                }
                if (!gridData || !exitCells?.length) return;
                const group = new THREE.Group();
                group.name = `exit-markers-floor-${floorIndex}`;
                const mat = new THREE.MeshBasicMaterial({ color: 0x4488ff });
                exitCells.forEach(({ col, row }) => {
                    const cell = gridData.grid[row]?.[col];
                    if (!cell) return;
                    const geo = new THREE.SphereGeometry(gridData.cellSize * 0.2, 12, 12);
                    const mesh = new THREE.Mesh(geo, mat.clone());
                    mesh.position.set(cell.worldX, floorY + 0.3, cell.worldZ);
                    group.add(mesh);
                });
                scene.add(group);
            }

            let data;
            try {
                setLoadStatus("Fetching tactical model from commander...");
                data = await getData();
            } catch (err) {
                setLoadStatus("Failed: " + err.message);
                document.getElementById("error").textContent =
                    "Make sure your phone is on the same WiFi as the laptop.";
                return;
            }

            if (data.error) {
                setLoadStatus("No data: " + data.error);
                return;
            }

            // Hide loading, show UI
            document.getElementById("loading").style.display = "none";
            document.getElementById("ui").style.display = "block";

            // ── Step 2: Three.js scene ────────────────────────────────
            const canvas = document.getElementById("c");
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0d1117);
            scene.fog = new THREE.FogExp2(0x0d1117, 0.012);

            const W = window.innerWidth;
            const H = window.innerHeight;

            const camera = new THREE.PerspectiveCamera(70, W / H, 0.1, 500);
            camera.position.set(0, 20, 35);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(W, H);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dir = new THREE.DirectionalLight(0xffffff, 0.8);
            dir.position.set(20, 40, 20);
            dir.castShadow = true;
            scene.add(dir);

            // ── Step 3: Render floors ─────────────────────────────────
            // Support both old format (walls key) and new compressed format (w key)
            const FLOOR_HEIGHT = 12;
            const sc = data.sc || data.scale || 0.05;
            const wh = data.wh || data.wallHeight || 3.0;

            const floorColors = [0xb0bec5, 0x90caf9, 0xa5d6a7, 0xffcc80, 0xf48fb1];
            const floorList = data.fl || data.floors || [];
            const activeFloor = Number.isFinite(data.af) ? data.af : 0;

            let totalWalls = 0;
            let allMinX = Infinity, allMaxX = -Infinity;
            let allMinZ = Infinity, allMaxZ = -Infinity;

            floorList.forEach(floor => {
                const fi = floor.fi ?? floor.floorIndex ?? 0;
                const walls = floor.w || floor.walls || [];
                const yOff = fi * FLOOR_HEIGHT;
                const gridData = createGrid(walls, sc, 0.5);

                totalWalls += walls.length;

                const mat = new THREE.MeshLambertMaterial({
                    color: floorColors[fi % floorColors.length],
                    side: THREE.DoubleSide
                });

                walls.forEach(wall => {
                    // Support both compressed (s/e) and full (start/end) formats
                    const sx = (wall.s ? wall.s[0] : wall.start[0]) * sc;
                    const sz = (wall.s ? wall.s[1] : wall.start[1]) * sc;
                    const ex = (wall.e ? wall.e[0] : wall.end[0]) * sc;
                    const ez = (wall.e ? wall.e[1] : wall.end[1]) * sc;

                    allMinX = Math.min(allMinX, sx, ex);
                    allMaxX = Math.max(allMaxX, sx, ex);
                    allMinZ = Math.min(allMinZ, sz, ez);
                    allMaxZ = Math.max(allMaxZ, sz, ez);

                    const dx = ex - sx;
                    const dz = ez - sz;
                    const len = Math.sqrt(dx * dx + dz * dz);
                    if (len < 0.05) return;

                    const geo = new THREE.BoxGeometry(len, wh, 0.15);
                    const mesh = new THREE.Mesh(geo, mat.clone());
                    mesh.position.set(
                        (sx + ex) / 2,
                        yOff + wh / 2,
                        (sz + ez) / 2
                    );
                    mesh.rotation.y = -Math.atan2(dz, dx);
                    mesh.castShadow = mesh.receiveShadow = true;
                    scene.add(mesh);
                });

                // Floor plane for this level
                const pw = (allMaxX - allMinX) + 8;
                const pd = (allMaxZ - allMinZ) + 8;
                const pcx = (allMinX + allMaxX) / 2;
                const pcz = (allMinZ + allMaxZ) / 2;
                const fGeo = new THREE.PlaneGeometry(Math.max(pw, 20), Math.max(pd, 20));
                const fMat = new THREE.MeshLambertMaterial({ color: 0x111122 });
                const fMesh = new THREE.Mesh(fGeo, fMat);
                fMesh.rotation.x = -Math.PI / 2;
                fMesh.position.set(pcx, yOff - 0.01, pcz);
                fMesh.receiveShadow = true;
                scene.add(fMesh);

                if (fi === activeFloor && data.ec?.length) {
                    computeHeatmap(gridData, data.ec, data.wt || {});
                    renderHeatmap(scene, gridData, fi, yOff);
                    renderExitMarkers(scene, gridData, data.ec, fi, yOff);
                }
            });

            // Aim camera at building center
            const cx = (allMinX + allMaxX) / 2;
            const cz = (allMinZ + allMaxZ) / 2;
            const sz = Math.max(allMaxX - allMinX, allMaxZ - allMinZ);
            camera.position.set(cx, sz * 0.8, cz + sz);
            camera.lookAt(cx, 0, cz);

            // Update info panel
            const floorCount = floorList.length;
            document.getElementById("info").innerHTML =
                `<strong style="color:#c9d1d9">${floorCount} floor(s)</strong><br>` +
                `${totalWalls} walls rendered<br>` +
                `Scale: ${sc}`;

            // ── Step 4: Touch + mouse orbit controls ──────────────────
            let isDragging = false;
            let lastX = 0, lastY = 0;
            let theta = 0;
            let phi = Math.PI / 4;
            let radius = sz * 1.2 || 30;
            const target = new THREE.Vector3(cx, 0, cz);

            function updateCamera() {
                camera.position.set(
                    target.x + radius * Math.sin(phi) * Math.sin(theta),
                    target.y + radius * Math.cos(phi),
                    target.z + radius * Math.sin(phi) * Math.cos(theta)
                );
                camera.lookAt(target);
            }
            updateCamera();

            // Mouse
            canvas.addEventListener("mousedown", e => {
                isDragging = true;
                lastX = e.clientX; lastY = e.clientY;
            });
            window.addEventListener("mouseup", () => { isDragging = false; });
            window.addEventListener("mousemove", e => {
                if (!isDragging) return;
                theta -= (e.clientX - lastX) * 0.005;
                phi = Math.max(0.05, Math.min(Math.PI * 0.9,
                    phi - (e.clientY - lastY) * 0.005));
                lastX = e.clientX; lastY = e.clientY;
                updateCamera();
            });
            canvas.addEventListener("wheel", e => {
                e.preventDefault();
                radius = Math.max(3, Math.min(200, radius + e.deltaY * 0.05));
                updateCamera();
            }, { passive: false });

            // Touch
            let lastTouchDist = 0;
            let lastTX = 0, lastTY = 0;

            canvas.addEventListener("touchstart", e => {
                e.preventDefault();
                if (e.touches.length === 1) {
                    isDragging = true;
                    lastTX = e.touches[0].clientX;
                    lastTY = e.touches[0].clientY;
                } else if (e.touches.length === 2) {
                    isDragging = false;
                    lastTouchDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                }
            }, { passive: false });

            canvas.addEventListener("touchend", e => {
                e.preventDefault();
                if (e.touches.length < 2) lastTouchDist = 0;
                if (e.touches.length === 0) isDragging = false;
            }, { passive: false });

            canvas.addEventListener("touchmove", e => {
                e.preventDefault();
                if (e.touches.length === 1 && isDragging) {
                    theta -= (e.touches[0].clientX - lastTX) * 0.005;
                    phi = Math.max(0.05, Math.min(Math.PI * 0.9,
                        phi - (e.touches[0].clientY - lastTY) * 0.005));
                    lastTX = e.touches[0].clientX;
                    lastTY = e.touches[0].clientY;
                    updateCamera();

                } else if (e.touches.length === 2) {
                    const dist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    if (lastTouchDist > 0) {
                        radius = Math.max(3, Math.min(200,
                            radius - (dist - lastTouchDist) * 0.05));
                        updateCamera();
                    }
                    lastTouchDist = dist;
                }
            }, { passive: false });

            // Resize
            window.addEventListener("resize", () => {
                const W = window.innerWidth;
                const H = window.innerHeight;
                camera.aspect = W / H;
                camera.updateProjectionMatrix();
                renderer.setSize(W, H);
            });

            // ── Step 5: Render loop ───────────────────────────────────
            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();

            document.getElementById("status").textContent =
                "Drag → orbit  ·  Pinch → zoom";

        })();

        function setLoadStatus(msg) {
            const el = document.getElementById("load-status");
            if (el) el.textContent = msg;
        }
    </script>
</body>

</html>
